name: ProjectZ Unity Build Pipeline

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
  UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
  UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
  UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/projectz-server

jobs:
  # ─── Job 1: Windows Client Build ────────────────────────────────────────────
  windows-build:
    name: 🪟 Build — Windows Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Cache Library (Windows)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: Library
          key: Library-Win-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Win-
            Library-

      - name: Unity Build — StandaloneWindows64
        uses: game-ci/unity-builder@1d4ee0697f193f54668e98961d79907911f4b4f2 # v4
        with:
          projectPath: .
          unityVersion: 6000.3.10f1
          targetPlatform: StandaloneWindows64
          buildName: ProjectZ-Windows

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Build-Windows
          path: build/StandaloneWindows64
          retention-days: 7

  # ─── Job 2: Linux Dedicated Server Build ────────────────────────────────────
  linux-server-build:
    name: 🐧 Build — Linux Dedicated Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Cache Library (Linux Server)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: Library
          key: Library-LinuxServer-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-LinuxServer-
            Library-

      - name: Unity Build — Linux Dedicated Server
        uses: game-ci/unity-builder@1d4ee0697f193f54668e98961d79907911f4b4f2 # v4
        with:
          projectPath: .
          unityVersion: 6000.3.10f1
          targetPlatform: StandaloneLinux64
          customParameters: -standaloneBuildSubtarget Server
          buildName: ProjectZ_Server
          buildsPath: Builds/LinuxServer

      - name: Upload Linux Server Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Build-LinuxServer
          path: Builds/LinuxServer
          retention-days: 7

  # ─── Job 3: Docker Image Build & Push to GHCR ───────────────────────────────
  docker-push:
    name: 🐳 Docker — Build & Push Server Image
    runs-on: ubuntu-latest
    needs: linux-server-build          # Linux Server build tamamlanmadan başlama
    if: success()                      # Sadece build başarılıysa devam et
    permissions:
      contents: read
      packages: write                  # GHCR'ye push için gerekli

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Download Linux Server Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: Build-LinuxServer
          path: Builds/LinuxServer

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ./Dockerfile.server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
