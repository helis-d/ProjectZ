name: SonarCloud Quality Analysis

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  sonarcloud-scan:
    name: 🔍 Code Quality & Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # SonarCloud tam branch geçmişine ihtiyaç duyar (relevancy issues)

      - name: Run SonarQube / SonarCloud Scanner
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=helis-d_ProjectZ
            -Dsonar.organization=helis-d
            -Dsonar.sources=Assets/Scripts,backend/src
            -Dsonar.inclusions=Assets/Scripts/**/*.cs,backend/src/**/*.ts
            -Dsonar.csharp.analyze_test_dirs=false
            -Dsonar.exclusions=Assets/Synty/**,Assets/Plugins/**,Packages/**,ProjectSettings/**,Library/**,Temp/**,backend/node_modules/**,backend/build/**,**/*.pb.go,**/*.go,**/*.h,**/*.c,**/*.cpp
            -Dsonar.cpd.exclusions=Assets/Synty/**,Assets/Plugins/**,backend/node_modules/**,backend/build/**,**/*.pb.go,**/*.go
            -Dsonar.go.file.suffixes=-
            -Dsonar.c.file.suffixes=-
            -Dsonar.cpp.file.suffixes=-
            -Dsonar.objc.file.suffixes=-
