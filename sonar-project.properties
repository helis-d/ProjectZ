sonar.projectKey=helis-d_ProjectZ
sonar.organization=helis-d

# Analyze only first-party gameplay and backend source code.
sonar.sources=Assets/Scripts,backend/src
sonar.tests=Assets/Tests
sonar.test.inclusions=Assets/Tests/**/*.cs

# Exclude generated, vendor and Unity runtime folders from quality metrics.
sonar.exclusions=Assets/Synty/**,Assets/Plugins/**,Packages/**,ProjectSettings/**,Library/**,Temp/**,backend/node_modules/**,backend/build/**,**/*.pb.go,**/*.meta
sonar.cpd.exclusions=Assets/Synty/**,Assets/Plugins/**,backend/node_modules/**,backend/build/**,**/*.pb.go
